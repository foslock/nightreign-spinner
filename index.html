<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nightreign Weapon Spinner</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-bright: #f0d478;
    --gold-dim: #8a6d2b;
    --bg-deep: #0a0a0f;
    --bg-card: #111118;
    --ember: #d4451a;
    --ember-glow: #ff6b3d;
    --text: #d4cfc0;
    --text-dim: #7a7565;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Cinzel', serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(212,69,26,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .grain-overlay {
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 820px;
    padding: 1.5rem 1rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.4rem;
  }

  .title-block { text-align: center; }
  .title-block h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.1rem, 4vw, 1.6rem);
    font-weight: 900;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    text-shadow: 0 0 20px rgba(201,168,76,0.3), 0 2px 4px rgba(0,0,0,0.6);
    line-height: 1.3;
  }
  .title-block .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.7rem, 2.5vw, 0.9rem);
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-top: 0.3rem;
  }

  .ornament {
    width: 60%;
    max-width: 300px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    position: relative;
  }
  .ornament::after {
    content: '◆';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: var(--gold-dim);
    font-size: 0.5rem;
    background: var(--bg-deep);
    padding: 0 0.75rem;
  }

  .spin-btn {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 700;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bg-deep);
    background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 40%, var(--gold-dim) 100%);
    border: none;
    padding: 0.9em 2.5em;
    cursor: pointer;
    clip-path: polygon(6% 0%, 94% 0%, 100% 50%, 94% 100%, 6% 100%, 0% 50%);
    transition: transform 0.15s, filter 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .spin-btn:hover { transform: scale(1.04); filter: brightness(1.1); }
  .spin-btn:active { transform: scale(0.97); filter: brightness(0.95); }
  .spin-btn.disabled { pointer-events: none; opacity: 0.5; filter: saturate(0.3); }

  .hint {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.65rem, 2vw, 0.78rem);
    color: var(--text-dim);
    letter-spacing: 0.1em;
    transition: opacity 0.4s;
  }
  .hint.hidden { opacity: 0; }

  .wheels-row {
    display: flex;
    gap: 1.5rem;
    width: 100%;
    justify-content: center;
  }

  .wheel-col {
    flex: 1;
    max-width: 380px;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
  }

  .player-label {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(0.8rem, 2.8vw, 1rem);
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(201,168,76,0.25);
  }

  /* WHEEL with side chevron */
  .wheel-outer {
    position: relative;
    width: 100%;
    display: flex;
    align-items: stretch;
  }

  .chevron-track {
    position: relative;
    width: 22px;
    min-width: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    flex-shrink: 0;
  }
  .chevron {
    width: 0; height: 0;
    border-top: 11px solid transparent;
    border-bottom: 11px solid transparent;
    border-left: 15px solid var(--gold-bright);
    filter: drop-shadow(2px 0 6px rgba(201,168,76,0.5));
    transition: border-left-color 0.4s, filter 0.4s;
  }
  .chevron.active {
    border-left-color: var(--ember-glow);
    filter: drop-shadow(2px 0 14px rgba(255,107,61,0.9));
  }

  .wheel-viewport {
    flex: 1;
    min-width: 0;
    height: 320px;
    overflow: hidden;
    border: 1px solid rgba(201,168,76,0.12);
    border-left: none;
    border-radius: 0 8px 8px 0;
    background: var(--bg-card);
    position: relative;
    cursor: grab;
    touch-action: none;
  }
  .wheel-viewport:active { cursor: grabbing; }
  .wheel-viewport.no-drag { cursor: default; }

  /* Selection highlight bar at vertical center */
  .center-bar {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 30px;
    transform: translateY(-50%);
    pointer-events: none;
    z-index: 6;
    border-top: 1px solid rgba(201,168,76,0.15);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    transition: border-color 0.4s, box-shadow 0.4s, background 0.4s;
  }
  .center-bar.active {
    border-color: var(--ember-glow);
    box-shadow: 0 0 24px rgba(255,107,61,0.3), inset 0 0 16px rgba(255,107,61,0.08);
    background: rgba(255,107,61,0.06);
  }

  /* Fade edges */
  .wheel-viewport::before,
  .wheel-viewport::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 38%;
    z-index: 5;
    pointer-events: none;
  }
  .wheel-viewport::before {
    top: 0;
    background: linear-gradient(to bottom, var(--bg-card) 0%, transparent 100%);
  }
  .wheel-viewport::after {
    bottom: 0;
    background: linear-gradient(to top, var(--bg-card) 0%, transparent 100%);
  }

  .wheel-strip {
    position: absolute;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    will-change: transform;
    user-select: none;
    -webkit-user-select: none;
  }

  .wheel-item {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: clamp(0.68rem, 2.3vw, 0.88rem);
    color: var(--text);
    letter-spacing: 0.08em;
    white-space: nowrap;
    transition: color 0.25s, text-shadow 0.25s;
  }

  .wheel-item.selected {
    color: var(--ember-glow);
    text-shadow: 0 0 14px rgba(255,107,61,0.7);
    font-weight: 700;
  }

  .result-box {
    min-height: 2.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .result-box.visible { opacity: 1; }

  .result-text {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 700;
    font-size: clamp(0.85rem, 3vw, 1.15rem);
    color: var(--ember-glow);
    text-shadow: 0 0 15px rgba(255,107,61,0.5), 0 0 30px rgba(212,69,26,0.3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    animation: resultPulse 1.5s ease-in-out infinite;
  }

  @keyframes resultPulse {
    0%, 100% { opacity: 1; text-shadow: 0 0 15px rgba(255,107,61,0.5), 0 0 30px rgba(212,69,26,0.3); }
    50% { opacity: 0.85; text-shadow: 0 0 25px rgba(255,107,61,0.7), 0 0 45px rgba(212,69,26,0.5); }
  }

  @media (max-width: 500px) {
    .wheels-row { gap: 0.6rem; }
    .container { padding: 1rem 0.4rem 1.5rem; }
    .chevron-track { width: 18px; min-width: 18px; }
    .chevron {
      border-top-width: 9px;
      border-bottom-width: 9px;
      border-left-width: 12px;
    }
    .wheel-viewport { height: 280px; }
  }
</style>
</head>
<body>
<div class="grain-overlay"></div>

<div class="container">
  <div class="title-block">
    <h1>Nightreign<br>Weapon Spinner</h1>
    <div class="subtitle">Elden Ring: Nightreign</div>
  </div>
  <div class="ornament"></div>
  <button class="spin-btn" id="spinBtn">Spin the Wheels</button>
  <div class="hint" id="hint">↕ drag to browse weapon types</div>

  <div class="wheels-row">
    <div class="wheel-col">
      <div class="player-label">Foster</div>
      <div class="wheel-outer">
        <div class="chevron-track"><div class="chevron" id="chevron1"></div></div>
        <div class="wheel-viewport" id="viewport1">
          <div class="center-bar" id="centerBar1"></div>
          <div class="wheel-strip" id="strip1"></div>
        </div>
      </div>
      <div class="result-box" id="result1">
        <span class="result-text" id="resultText1"></span>
      </div>
    </div>

    <div class="wheel-col">
      <div class="player-label">Jack</div>
      <div class="wheel-outer">
        <div class="chevron-track"><div class="chevron" id="chevron2"></div></div>
        <div class="wheel-viewport" id="viewport2">
          <div class="center-bar" id="centerBar2"></div>
          <div class="wheel-strip" id="strip2"></div>
        </div>
      </div>
      <div class="result-box" id="result2">
        <span class="result-text" id="resultText2"></span>
      </div>
    </div>
  </div>
</div>

<script>
const WEAPONS = [
  "Daggers","Straight Swords","Greatswords","Colossal Swords",
  "Thrusting Swords","Heavy Thrusting Swords","Curved Swords",
  "Curved Greatswords","Katanas","Twinblades","Axes","Greataxes",
  "Hammers","Flails","Great Hammers","Colossal Weapons","Spears",
  "Great Spears","Halberds","Reapers","Whips","Fists","Claws","Torches"
];
const N = WEAPONS.length;

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

class Wheel {
  constructor(ids) {
    this.vp = document.getElementById(ids.viewport);
    this.strip = document.getElementById(ids.strip);
    this.chevron = document.getElementById(ids.chevron);
    this.bar = document.getElementById(ids.bar);
    this.resBox = document.getElementById(ids.result);
    this.resTxt = document.getElementById(ids.resultText);

    this.items = [];
    this.ih = 0;       // item height
    this.offset = 0;
    this.copyH = 0;    // px height of one N-item copy
    this.numCopies = 0;
    this.canDrag = true;
    this.dragging = false;
    this._dy = 0;
    this._lastY = 0;
    this._startOff = 0;

    this._initDrag();
  }

  build() {
    this.strip.innerHTML = '';
    this.numCopies = 30;
    this.items = [];
    for (let c = 0; c < this.numCopies; c++) {
      this.items.push(...shuffle(WEAPONS));
    }
    const frag = document.createDocumentFragment();
    for (const name of this.items) {
      const d = document.createElement('div');
      d.className = 'wheel-item';
      d.textContent = name;
      frag.appendChild(d);
    }
    this.strip.appendChild(frag);

    return new Promise(resolve => {
      requestAnimationFrame(() => {
        const el = this.strip.children[0];
        this.ih = el ? el.getBoundingClientRect().height : 28;
        this.copyH = N * this.ih;
        this.bar.style.height = this.ih + 'px';

        // Start centered on middle copy
        const midIdx = Math.floor(this.numCopies / 2) * N + Math.floor(N / 2);
        const vpH = this.vp.clientHeight;
        this.offset = (vpH / 2) - (midIdx * this.ih + this.ih / 2);
        this._apply();
        resolve();
      });
    });
  }

  _apply() {
    this.strip.style.transform = `translateY(${this.offset}px)`;
  }

  // Infinite wrap: silently jump offset when it drifts too far
  _wrap() {
    const totalH = this.copyH * this.numCopies;
    const vpH = this.vp.clientHeight;
    const lo = -(totalH - vpH);
    while (this.offset < lo + this.copyH * 4) this.offset += this.copyH;
    while (this.offset > -this.copyH * 4) this.offset -= this.copyH;
  }

  _initDrag() {
    const start = (y) => {
      if (!this.canDrag) return;
      this.dragging = true;
      this._lastY = y;
      this._startOff = this.offset;
    };
    const move = (y) => {
      if (!this.dragging) return;
      const dy = y - this._lastY;
      this._lastY = y;
      this.offset += dy;
      this._wrap();
      this._apply();
    };
    const end = () => { this.dragging = false; };

    this.vp.addEventListener('mousedown', e => { e.preventDefault(); start(e.clientY); });
    window.addEventListener('mousemove', e => move(e.clientY));
    window.addEventListener('mouseup', end);
    this.vp.addEventListener('touchstart', e => start(e.touches[0].clientY), { passive: true });
    this.vp.addEventListener('touchmove', e => {
      if (this.dragging) e.preventDefault();
      move(e.touches[0].clientY);
    }, { passive: false });
    this.vp.addEventListener('touchend', end);
  }

  // Index of item currently at viewport vertical center
  _centerIdx() {
    const vpH = this.vp.clientHeight;
    const centerPx = (vpH / 2) - this.offset;
    return Math.round((centerPx - this.ih / 2) / this.ih);
  }

  clearSelection() {
    this.chevron.classList.remove('active');
    this.bar.classList.remove('active');
    this.resBox.classList.remove('visible');
    this.strip.querySelectorAll('.selected').forEach(e => e.classList.remove('selected'));
  }

  spin(onDone) {
    this.clearSelection();
    this.canDrag = false;
    this.vp.classList.add('no-drag');

    const vpH = this.vp.clientHeight;

    // Pick landing target in a safe range
    const lo = N * 8;
    const hi = this.items.length - N * 8;
    const tIdx = lo + Math.floor(Math.random() * (hi - lo));

    // Desired offset so tIdx is at viewport center
    const landOffset = (vpH / 2) - (tIdx * this.ih + this.ih / 2);

    // Spin extra distance (always scroll upward = offset decreasing)
    const extraItems = N * (5 + Math.floor(Math.random() * 5));
    const travel = (this.offset - landOffset) + extraItems * this.ih;
    // If travel happens to be negative (already past target), add more
    const totalTravel = travel > 0 ? travel : travel + this.copyH * 3;

    const startOff = this.offset;
    const endOff = startOff - totalTravel;
    // We'll ease toward endOff, but then snap to landOffset at end
    // Actually let's just interpolate properly:
    // The actual end position should be landOffset. The total animated distance is:
    const animDist = startOff - landOffset + extraItems * this.ih;

    const dur = 4500 + Math.random() * 2000;
    let t0 = null;
    const self = this;

    function ease(t) { return 1 - Math.pow(1 - t, 4); }

    function tick(ts) {
      if (!t0) t0 = ts;
      const p = Math.min((ts - t0) / dur, 1);
      const e = ease(p);
      self.offset = startOff - animDist * e;
      self._apply();

      if (p < 1) {
        requestAnimationFrame(tick);
      } else {
        self.offset = landOffset;
        self._apply();

        // Highlight
        const el = self.strip.children[tIdx];
        if (el) el.classList.add('selected');
        self.chevron.classList.add('active');
        self.bar.classList.add('active');
        self.resTxt.textContent = self.items[tIdx];
        self.resBox.classList.add('visible');
        if (onDone) onDone();
      }
    }
    requestAnimationFrame(tick);
  }

  unlock() {
    this.canDrag = true;
    this.vp.classList.remove('no-drag');
  }
}

// ── Setup ──
let w1, w2, spinning = false;

async function init() {
  w1 = new Wheel({
    viewport:'viewport1', strip:'strip1', chevron:'chevron1',
    bar:'centerBar1', result:'result1', resultText:'resultText1'
  });
  w2 = new Wheel({
    viewport:'viewport2', strip:'strip2', chevron:'chevron2',
    bar:'centerBar2', result:'result2', resultText:'resultText2'
  });
  await w1.build();
  await w2.build();
}

document.getElementById('spinBtn').addEventListener('click', async () => {
  if (spinning) return;
  spinning = true;
  const btn = document.getElementById('spinBtn');
  const hint = document.getElementById('hint');
  btn.classList.add('disabled');
  hint.classList.add('hidden');

  // Rebuild fresh shuffles
  await w1.build();
  await w2.build();

  // Wait one more frame then spin
  requestAnimationFrame(() => {
    let done = 0;
    const fin = () => {
      if (++done >= 2) {
        spinning = false;
        btn.classList.remove('disabled');
        hint.classList.remove('hidden');
        w1.unlock();
        w2.unlock();
      }
    };
    w1.spin(fin);
    w2.spin(fin);
  });
});

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
